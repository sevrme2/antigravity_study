<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KU Club Hub</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- ===============================
       LOGIN SCREEN OVERLAY
       =============================== -->
  <div id="auth-screen" class="login-screen active">
    
    <!-- LOGIN VIEW -->
    <div id="view-login" class="login-container active-view">
      <h1 class="login-title">KU CLUB HUB</h1>
      <p class="login-subtitle">고려대학교 중앙동아리 플랫폼에 오신 것을 환영합니다.</p>
      
      <div class="login-form">
        <input type="text" id="login-id" class="text-input" placeholder="아이디 (학번 또는 이메일)" />
        <input type="password" id="login-pw" class="text-input" placeholder="비밀번호" />
        
        <div class="checkbox-group">
          <input type="checkbox" id="auto-login-check" />
          <label for="auto-login-check">자동 로그인</label>
        </div>
        
        <div class="login-actions">
          <button id="btn-login-submit" class="btn-primary">로그인</button>
        </div>
        
        <div class="login-toggle">
          <span class="auth-link" data-target="view-signup">계정이 없으신가요? <b>회원가입</b></span>
          <span class="auth-link divider">|</span>
          <span class="auth-link" data-target="view-forgot"><b>비밀번호 찾기</b></span>
        </div>
      </div>
    </div>

    <!-- SIGNUP VIEW -->
    <div id="view-signup" class="login-container hidden-view">
      <h1 class="login-title" style="font-size:32px;">회원가입</h1>
      <p class="login-subtitle">KU Club Hub 계정을 생성합니다.</p>
      
      <div class="login-form">
        <!-- 1. Email -->
        <div class="input-with-btn">
          <input type="text" id="signup-email" class="text-input" placeholder="이메일 입력" />
          <button id="btn-send-auth" class="btn-black btn-small">인증요청</button>
        </div>
        
        <!-- 2. Email Auth -->
        <div class="input-with-btn" id="auth-code-group" style="display:none;">
          <input type="text" id="signup-auth-code" class="text-input" placeholder="인증번호 4자리 (1234)" />
          <button id="btn-verify-auth" class="btn-black btn-small">확인</button>
        </div>
        <p id="auth-status-msg" class="status-msg"></p>

        <!-- 3. Student ID -->
        <input type="text" id="signup-studentid" class="text-input" placeholder="학번 또는 아이디 입력" />
        
        <!-- 4. Name -->
        <input type="text" id="signup-name" class="text-input" placeholder="이름 (또는 닉네임)" />

        <!-- 5. Password -->
        <input type="password" id="signup-pw" class="text-input" placeholder="비밀번호" />
        
        <div class="login-actions">
          <button id="btn-signup-submit" class="btn-primary">가입 완료</button>
        </div>
        
        <div class="login-toggle">
          <span class="auth-link" data-target="view-login">이미 계정이 있으신가요? <b>로그인</b></span>
        </div>
      </div>
    </div>

    <!-- FORGOT PASSWORD VIEW -->
    <div id="view-forgot" class="login-container hidden-view">
      <h1 class="login-title" style="font-size:32px;">비밀번호 찾기</h1>
      <p class="login-subtitle">가입 시 사용한 이메일을 인증해주세요.</p>
      
      <div class="login-form">
        <!-- 1. Email -->
        <div class="input-with-btn">
          <input type="text" id="forgot-email" class="text-input" placeholder="가입한 이메일 입력" />
          <button id="btn-forgot-send" class="btn-black btn-small">인증요청</button>
        </div>
        
        <!-- 2. Email Auth -->
        <div class="input-with-btn" id="forgot-code-group" style="display:none;">
          <input type="text" id="forgot-auth-code" class="text-input" placeholder="인증번호 4자리 (1234)" />
          <button id="btn-forgot-verify" class="btn-black btn-small">확인</button>
        </div>
        <p id="forgot-status-msg" class="status-msg"></p>

        <!-- 3. New Password -->
        <div id="forgot-new-pw-group" style="display:none;">
          <input type="password" id="forgot-new-pw" class="text-input" placeholder="새로운 비밀번호 설정" style="margin-bottom:12px;" />
          <button id="btn-forgot-submit" class="btn-primary">비밀번호 변경 완료</button>
        </div>
        
        <div class="login-toggle">
          <span class="auth-link" data-target="view-login"><b>로그인 화면으로 돌아가기</b></span>
        </div>
      </div>
    </div>

  </div>

  <!-- ===============================
       MAIN APP SCREEN
       =============================== -->
  <div id="main-screen" class="main-screen" style="display: none;">
    
    <!-- Floating Pill Navigation -->
    <nav class="floating-nav">
      <div class="nav-brand">KU CLUB HUB</div>
      <div class="nav-search">
        <input type="text" id="search-input" class="pill-search" placeholder="동아리 이름, 활동 키워드 검색..." />
      </div>
      <div class="nav-actions">
        <button id="favorites-toggle-btn" class="btn-ghost">관심 동아리</button>
        <button id="notification-bell-btn" class="btn-ghost">알림 <span id="noti-badge" class="badge" style="display:none;">0</span></button>
        <div class="user-profile">
          <span id="current-user-name">User</span>
          <button id="btn-logout" class="btn-black btn-small">로그아웃</button>
        </div>
      </div>

      <!-- Notifications Dropdown -->
      <div id="notification-dropdown" class="notification-dropdown" style="display:none;">
        <div class="noti-header">
          <h3>모집 알림</h3>
          <button id="noti-clear-btn" class="text-btn">모두 지우기</button>
        </div>
        <div id="noti-list" class="noti-list"></div>
      </div>
    </nav>

    <!-- Top Banner (Active Filters) -->
    <div class="top-banner" id="active-filters-banner" style="display:none;">
      <span class="banner-text">적용된 필터:</span>
      <div id="active-filters-bar" class="active-filters-bar"></div>
      <button id="clear-all-filters" class="banner-close">&times;</button>
    </div>

    <!-- Content Sections -->
    <!-- SECTION 1: FILTER (Crimson Full Bleed) -->
    <section class="section-filters section-crimson">
      <div class="container">
        <h2 class="section-title">Explore Clubs</h2>
        
        <div class="filter-groups">
          <!-- Status Filters -->
          <div class="filter-row">
            <span class="filter-label">모집 상태</span>
            <div class="pill-group" id="status-filters">
              <button class="filter-pill status-pill" data-status="모집중">🟢 모집중</button>
              <button class="filter-pill status-pill" data-status="상시모집">🔵 상시모집</button>
              <button class="filter-pill status-pill" data-status="마감">🔴 마감</button>
            </div>
          </div>

          <!-- Category Filters -->
          <div class="filter-row">
            <span class="filter-label">분과별 필터</span>
            <div class="pill-group" id="category-filters">
              <button class="filter-pill cat-pill active" data-category="all">전체보기 <span class="tab-count"></span></button>
              <button class="filter-pill cat-pill" data-category="학술연구분과">학술연구 <span class="tab-count"></span></button>
              <button class="filter-pill cat-pill" data-category="인문과학분과">인문과학 <span class="tab-count"></span></button>
              <button class="filter-pill cat-pill" data-category="종교분과">종교 <span class="tab-count"></span></button>
              <button class="filter-pill cat-pill" data-category="기악예술분과">기악예술 <span class="tab-count"></span></button>
              <button class="filter-pill cat-pill" data-category="연행예술분과">연행예술 <span class="tab-count"></span></button>
              <button class="filter-pill cat-pill" data-category="전시창작분과">전시창작 <span class="tab-count"></span></button>
              <button class="filter-pill cat-pill" data-category="체육분과">체육 <span class="tab-count"></span></button>
              <button class="filter-pill cat-pill" data-category="사회분과">사회 <span class="tab-count"></span></button>
              <button class="filter-pill cat-pill" data-category="생활문화분과">생활문화 <span class="tab-count"></span></button>
            </div>
          </div>

          <!-- Keyword Filters -->
          <div class="filter-row">
            <span class="filter-label">인기 활동 키워드</span>
            <div class="pill-group" id="keyword-filters">
              <!-- Rendered via JS -->
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- SECTION 2: RESULTS (Ivory Base) -->
    <section class="section-results section-ivory">
      <div class="container">
        <div class="results-header">
          <h2 class="results-title">Results <span id="club-count-number" class="results-count">0</span></h2>
          <div class="sort-controls">
            <select id="sort-select" class="select-pill">
              <option value="category">분과별 그룹핑</option>
              <option value="name">동아리 이름순</option>
              <option value="recruiting">모집 상태순</option>
            </select>
          </div>
        </div>

        <div class="club-grid" id="club-grid">
          <!-- Dynamic Club Cards will be inserted here -->
        </div>
      </div>
    </section>

  </div>

  <!-- Modal overlay for details -->
  <div id="club-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <button id="modal-close" class="modal-close-btn">&times;</button>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
